<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A84FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Aabshar" />
    <link rel="apple-touch-icon" href="/src/assets/images/regenerated_image_1779783054758.png" />
    <link rel="preload" href="/src/assets/images/abshar_mountain_scenery_1779999755087.png" as="image" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://aabshar.org" />
    <meta name="description" content="Aabshar Mineral Water provides pure, natural, and refreshing bottled drinking water for homes, offices, businesses, and events. Pure Water, Pure Trust." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:site_name" content="Aabshar Mineral Water" />
    <meta property="og:title" content="Aabshar Mineral Water | Pure Water, Pure Trust" />
    <meta property="og:description" content="Premium mineral water brand delivering pure and refreshing drinking water." />
    <meta property="og:url" content="https://aabshar.org" />
    
    <!-- Google Site Name and Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Aabshar Mineral Water",
      "alternateName": "Aabshar",
      "url": "https://aabshar.org"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Aabshar Mineral Water",
      "url": "https://aabshar.org",
      "logo": "https://aabshar.org/logo.png",
      "description": "Premium bottled mineral water brand providing pure, safe, and refreshing drinking water.",
      "brand": {
        "@type": "Brand",
        "name": "Aabshar Mineral Water"
      }
    }
    </script>
    <title>Aabshar Mineral Water | Pure Water, Pure Trust</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('ServiceWorker registered with scope:', reg.scope))
            .catch((err) => console.warn('ServiceWorker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
